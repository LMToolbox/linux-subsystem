name: Build Alpine Rootfs

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      alpine_version:
        description: "Alpine version"
        required: false
        default: "3.22.2"
      force_release:
        description: "Force release even if no changes?"
        type: boolean
        default: false

permissions:
  contents: write

env:
  DEFAULT_ALPINE_VERSION: "3.22.2"

jobs:
  # ------------------------------------------------------------------
  # JOB 1: Calculate Version ID
  # ------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc_ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        id: calc_ver
        run: |
          BASE_VER=$(date +'%y.%m.%d')
          NEW_TAG="$BASE_VER"
          EXISTING_TAGS=$(git tag -l "${BASE_VER}*")
            
          if [[ "$EXISTING_TAGS" == *"$BASE_VER"* ]]; then
             for suffix in a b c d e f g; do
               if [[ "$EXISTING_TAGS" != *"${BASE_VER}${suffix}"* ]]; then
                 NEW_TAG="${BASE_VER}${suffix}"
                 break
               fi
             done
          fi
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------
  # JOB 2: Build (Parallel)
  # ------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64/v8
          - arch: arm
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set Environment
        run: |
          if [ -n "${{ inputs.alpine_version }}" ]; then
            echo "ALPINE_VERSION=${{ inputs.alpine_version }}" >> $GITHUB_ENV
          else
            echo "ALPINE_VERSION=${{ env.DEFAULT_ALPINE_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Rootfs
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p out
            
          if [ -f config.yaml ]; then
            APK_PKGS=$(yq -r '.apk[] // ""' config.yaml | tr '\n' ' ')
            # Parse build dependencies
            APK_BUILD_PKGS=$(yq -r '.apk_build[] // ""' config.yaml | tr '\n' ' ')
            PIP_PKGS=$(yq -r '.pip[] // ""' config.yaml | tr '\n' ' ')
          else
            echo "No config.yaml found!"
            exit 1
          fi

          # We explicitly sort the manifests inside the container to ensure determinism
          docker run --platform "$PLATFORM" \
            -e APK_PKGS="$APK_PKGS" \
            -e APK_BUILD_PKGS="$APK_BUILD_PKGS" \
            -e PIP_PKGS="$PIP_PKGS" \
            -v $(pwd)/out:/out \
            --name rootfs alpine:"${ALPINE_VERSION}" sh -euxc "
            
            apk -U upgrade --no-cache
            
            # 0. Install Custom Build Dependencies (Virtual Tag for easy removal)
            # We install these FIRST so they are available for any pip builds
            if [ -n \"\$APK_BUILD_PKGS\" ]; then 
              apk add --no-cache --virtual .custom-build-deps \$APK_BUILD_PKGS
            fi

            # 1. Install User Runtime APK Packages
            if [ -n \"\$APK_PKGS\" ]; then 
              apk add --no-cache \$APK_PKGS
            fi
            
            # 2. Handle PIP Packages
            if [ -n \"\$PIP_PKGS\" ]; then              
              # Install user pip packages (might rely on .custom-build-deps installed in Step 0)
              pip install --no-cache-dir --break-system-packages \$PIP_PKGS
              
              # Manifest PIP (Before cleanup)
              pip freeze | sort > /out/manifest-pip-${ARCH}.txt
            else
              touch /out/manifest-pip-${ARCH}.txt
            fi

            # 3. Cleanup Custom Build Dependencies
            # We remove these BEFORE generating the APK manifest so they don't appear in the logs
            if [ -n \"\$APK_BUILD_PKGS\" ]; then
              apk del .custom-build-deps
            fi
            
            echo \"$IMAGE_VERSION\" > /etc/image-version
            chmod 644 /etc/image-version
            
            # 4. Generate APK Manifest (Now clean of build deps)
            apk info -v | sort > /out/manifest-apk-${ARCH}.txt
            
            # Cleanup Caches
            rm -rf /var/cache/apk/* /usr/share/man /usr/share/doc /usr/share/locale /tmp/* /root/.cache
            find /usr/lib/python* -name "__pycache__" -type d -exec rm -rf "{}" +
            find /usr/lib/python* -name "*.pyc" -type f -delete
            find /usr/lib/python* -name "*.pyo" -type f -delete
            rm -rf /usr/lib/python*/test \
                   /usr/lib/python*/ensurepip \
                   /usr/lib/python*/idlelib \
                   /usr/lib/python*/pydoc_data
            rm -rf /usr/share/perl5/core_perl/pod
             rm -rf /usr/include /usr/lib/*.a 
             
            mkdir -p /proc /sys /dev
          "
            
          docker export rootfs | xz -9e -c > "out/alpine-rootfs-${ARCH}.tar.xz"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-data-${{ matrix.arch }}
          path: |
            out/alpine-rootfs-${{ matrix.arch }}.tar.xz
            out/manifest-apk-${{ matrix.arch }}.txt
            out/manifest-pip-${{ matrix.arch }}.txt

  # ------------------------------------------------------------------
  # JOB 3: Release & Compare
  # ------------------------------------------------------------------
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Current Build Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: build-data-*
          path: current_assets
          merge-multiple: true

      - name: Fetch Previous Release Manifests
        id: fetch_prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prev_assets
           
          # 1. Find latest release (Filter out 'proot-')
          LATEST_TAG=$(gh release list --limit 20 --exclude-drafts --exclude-pre-releases --json tagName \
            --jq '.[] | select(.tagName | startswith("proot-") | not) | .tagName' | head -n 1 || echo "")
           
          echo "Latest detected tag: [$LATEST_TAG]"
           
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "is_initial=true" >> $GITHUB_OUTPUT
            echo "::notice::No previous release found."
          else
            echo "is_initial=false" >> $GITHUB_OUTPUT
            
            # 2. Attempt to download manifests
            for arch in x86_64 aarch64 arm; do
              # APK
              if ! gh release download "$LATEST_TAG" -p "manifest-apk-${arch}.txt" -O "prev_assets/manifest-apk-${arch}.txt" 2>/dev/null; then
                 echo "No strict APK manifest found for $arch. Treating as new."
                 touch "prev_assets/manifest-apk-${arch}.txt"
              fi

              # PIP
              if ! gh release download "$LATEST_TAG" -p "manifest-pip-${arch}.txt" -O "prev_assets/manifest-pip-${arch}.txt" 2>/dev/null; then
                 touch "prev_assets/manifest-pip-${arch}.txt"
              fi
            done
          fi

      - name: Generate Unified Changelog
        id: changelog
        run: |
          mkdir -p rows
          CHANGES_DETECTED="false"

          parse_apk_line() {
            local line="$1"
            pkg="${line%%-[0-9]*}"
            ver="${line#${pkg}-}"
            echo "$pkg $ver"
          }

          parse_pip_line() {
            local line="$1"
            pkg="${line%%==*}"
            ver="${line#${pkg}==}"
            echo "$pkg $ver"
          }

          generate_rows() {
            local arch=$1
            local outfile="rows/${arch}.txt"
            touch "$outfile"

            cat "prev_assets/manifest-apk-${arch}.txt" "prev_assets/manifest-pip-${arch}.txt" > combined_old.txt
            cat "current_assets/manifest-apk-${arch}.txt" "current_assets/manifest-pip-${arch}.txt" > combined_new.txt

            declare -A OLD NEW

            # Read Combined OLD
            while read -r line; do
              [ -z "$line" ] && continue
              if [[ "$line" == *==* ]]; then
                read pkg ver <<<"$(parse_pip_line "$line")"
              else
                read pkg ver <<<"$(parse_apk_line "$line")"
              fi
              OLD["$pkg"]="$ver"
            done < combined_old.txt

            # Read Combined NEW
            while read -r line; do
              [ -z "$line" ] && continue
              if [[ "$line" == *==* ]]; then
                read pkg ver <<<"$(parse_pip_line "$line")"
              else
                read pkg ver <<<"$(parse_apk_line "$line")"
              fi
              NEW["$pkg"]="$ver"
            done < combined_new.txt

            ALL_PKGS=$(printf "%s\n" "${!OLD[@]}" "${!NEW[@]}" | sort -u)

            for pkg in $ALL_PKGS; do
              old="${OLD[$pkg]}"
              new="${NEW[$pkg]}"
              if [[ -n "$old" && -n "$new" ]]; then
                if [[ "$old" != "$new" ]]; then
                  echo "| ⬆️ | \`$pkg\` | \`$old\` | \`$new\` |" >> "$outfile"
                fi
              elif [[ -n "$old" ]]; then
                echo "| ❌ | \`$pkg\` | \`$old\` | - |" >> "$outfile"
              elif [[ -n "$new" ]]; then
                echo "| 🟢 | \`$pkg\` | - | \`$new\` |" >> "$outfile"
              fi
            done

            sort -o "$outfile" "$outfile"

            if [ -s "$outfile" ]; then
              CHANGES_DETECTED="true"
            fi
            
            rm combined_old.txt combined_new.txt
          }

          generate_rows x86_64
          generate_rows aarch64
          generate_rows arm

          FINAL_LOG=""

          if [ "${{ steps.fetch_prev.outputs.is_initial }}" == "true" ]; then
            CHANGES_DETECTED="true"
            FINAL_LOG="Initial Release."
          elif [ "$CHANGES_DETECTED" == "true" ]; then
            FINAL_LOG+="### 🚀 Changes"$'\n'
            FINAL_LOG+="| ● | Package | Old | New |"$'\n'
            FINAL_LOG+="|:--:|:--------|:----|:-----|"$'\n'
            FINAL_LOG+=$(cat "rows/x86_64.txt")
            
            for arch in aarch64 arm; do
              diff_out="rows/${arch}_specific.txt"
              comm -13 rows/x86_64.txt rows/${arch}.txt > "$diff_out"
              if [ -s "$diff_out" ]; then
                FINAL_LOG+=$'\n\n'"### 📦 ${arch} Specifics"$'\n'
                FINAL_LOG+="| ● | Package | Old | New |"$'\n'
                FINAL_LOG+="|:--:|:--------|:----|:-----|"$'\n'
                FINAL_LOG+="$(cat "$diff_out")"
              fi
            done
          fi

          if [ "${{ inputs.force_release }}" == "true" ]; then
            CHANGES_DETECTED="true"
          fi

          echo "needed=$CHANGES_DETECTED" >> $GITHUB_OUTPUT
          printf "full_log<<EOF\n%s\nEOF\n" "$FINAL_LOG" >> $GITHUB_OUTPUT

          
      - name: Package Artifacts
        if: steps.changelog.outputs.needed == 'true'
        run: |
          mkdir -p final_package
          
          package_arch() {
            local SRC_ARCH=$1
            local DEST_DIR=$2
            mkdir -p "final_package/$DEST_DIR"
            if [ -f "current_assets/alpine-rootfs-${SRC_ARCH}.tar.xz" ]; then
              mv "current_assets/alpine-rootfs-${SRC_ARCH}.tar.xz" \
                  "final_package/$DEST_DIR/libalpine-rootfs.tar.xz.so"
            fi
          }

          package_arch "x86_64"  "x86_64"
          package_arch "aarch64" "arm64-v8a"
          package_arch "arm"      "armeabi-v7a"

          echo "==> Creating Master Archive..."
          tar -czf alpine-rootfs.tar.gz -C final_package .

      - name: Push Release
        if: steps.changelog.outputs.needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
              ## Automated Build ${{ needs.prepare.outputs.version }}
              Base Alpine: ${{ env.DEFAULT_ALPINE_VERSION }}
              
              ${{ steps.changelog.outputs.full_log }}
          files: |
            alpine-rootfs.tar.gz
            current_assets/manifest-*.txt
          make_latest: true
